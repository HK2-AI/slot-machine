name: Build Android

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Upload AAB to Google Play internal track'
        type: boolean
        default: true
      track:
        description: 'Google Play track'
        type: choice
        default: internal
        options: [internal, alpha, beta, production]

env:
  PACKAGE_NAME: com.etslot.app
  APP_NAME: Lucky Vegas Slots
  FIREBASE_PROJECT_ID: lucky-vegas-slots-a9889

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    outputs:
      version_name: ${{ steps.version.outputs.name }}
      version_code: ${{ steps.version.outputs.code }}
      apk_url: ${{ steps.upload_gcs.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate version
        id: version
        run: |
          NAME=$(date +'%y.%m.%d')
          CODE=$(( ($(date +%s) - 1577836800) / 60 ))
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Build web bundle
        run: pnpm build

      - name: Capacitor sync Android
        run: pnpm exec cap sync android

      - name: Inject version into android build.gradle
        run: |
          sed -i "s/versionCode .*/versionCode ${{ steps.version.outputs.code }}/" android/app/build.gradle
          sed -i "s/versionName .*/versionName \"${{ steps.version.outputs.name }}\"/" android/app/build.gradle

      - name: Decode keystore
        run: |
          echo "${{ secrets.ET_ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ET_ANDROID_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.ET_ANDROID_KEYALIAS_NAME }}
          KEY_PASSWORD: ${{ secrets.ET_ANDROID_KEYALIAS_PASS }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Build APK for Test Lab
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ET_ANDROID_KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.ET_ANDROID_KEYALIAS_NAME }}
          KEY_PASSWORD: ${{ secrets.ET_ANDROID_KEYALIAS_PASS }}
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$PWD/app/release.keystore \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Auth gcloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.ET_FIREBASE_SERVICE_ACCOUNT_JSON }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Firebase Test Lab Robo
        id: test_lab
        run: |
          RUN_ID="${{ github.run_id }}-${{ steps.version.outputs.code }}"
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          gcloud firebase test android run \
            --project=${{ env.FIREBASE_PROJECT_ID }} \
            --type robo \
            --app android/app/build/outputs/apk/release/app-release.apk \
            --device model=oriole,version=33,locale=en,orientation=portrait \
            --timeout 60s \
            --results-bucket=gs://${{ env.FIREBASE_PROJECT_ID }}-builds \
            --results-dir=test-lab/$RUN_ID \
            --no-auto-google-login || echo "test_lab_failed=true" >> $GITHUB_OUTPUT

      - name: Download Test Lab artifacts
        if: always()
        run: |
          mkdir -p test-lab-results
          gsutil -m cp -r gs://${{ env.FIREBASE_PROJECT_ID }}-builds/test-lab/${{ steps.test_lab.outputs.run_id }}/* test-lab-results/ || true
          gsutil -m rm -r gs://${{ env.FIREBASE_PROJECT_ID }}-builds/test-lab/${{ steps.test_lab.outputs.run_id }} || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-lab-results
          path: test-lab-results/
          retention-days: 14

      - name: Upload AAB to Google Play
        if: inputs.deploy
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJsonPlainText: ${{ secrets.ET_GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: ${{ env.PACKAGE_NAME }}
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Upload APK to GCS
        id: upload_gcs
        run: |
          KEY="${{ env.APP_NAME }}/${{ steps.version.outputs.name }}-${{ github.run_id }}.apk"
          gsutil cp android/app/build/outputs/apk/release/app-release.apk "gs://${{ env.FIREBASE_PROJECT_ID }}-builds/$KEY"
          URL=$(gsutil signurl -d 7d /tmp/sa.json "gs://${{ env.FIREBASE_PROJECT_ID }}-builds/$KEY" 2>/dev/null | tail -1 | awk '{print $NF}' || echo "")
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Notify Telegram
        if: always()
        env:
          BOT: ${{ secrets.CI_REPORT_TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.CI_REPORT_TELEGRAM_CHAT_ID }}
          TOPIC: ${{ secrets.CI_REPORT_TELEGRAM_TOPIC_ID }}
        run: |
          STATUS="${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
          MSG=$'🏗 Build '"${{ env.APP_NAME }}"$' Android\nStatus: '"$STATUS"$'\nVersion: '"${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})"$'\nTrack: '"${{ inputs.track }}"$'\nRun: '"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -d chat_id="$CHAT" \
            ${TOPIC:+-d message_thread_id="$TOPIC"} \
            -d text="$MSG"
          for f in test-lab-results/**/video.mp4 test-lab-results/**/logcat; do
            [ -f "$f" ] || continue
            curl -s -F document=@"$f" "https://api.telegram.org/bot$BOT/sendDocument?chat_id=$CHAT${TOPIC:+&message_thread_id=$TOPIC}"
          done
