name: Build iOS

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: 'Upload IPA to TestFlight'
        type: boolean
        default: true

env:
  BUNDLE_ID: com.etslot.app
  APP_NAME: Lucky Vegas Slots
  APPLE_TEAM_ID: UFVY8QVXZ8
  PROVISIONING_PROFILE_NAME: lucky-vegas-distribute-ci

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate version
        id: version
        run: |
          NAME=$(date +'%y.%m.%d')
          CODE=$(( ($(date +%s) - 1577836800) / 60 ))
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "code=$CODE" >> $GITHUB_OUTPUT

      - name: Build web bundle
        run: pnpm build

      - name: Capacitor copy + resolve SPM
        run: |
          pnpm exec cap copy ios
          cd ios/App
          xcodebuild -resolvePackageDependencies -scheme App

      - name: Import distribution cert + provisioning profile
        env:
          P12_BASE64: ${{ secrets.ET_IOS_P12_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.ET_IOS_P12_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.ET_IOS_PROFILE_BASE64 }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASS=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          echo "$P12_BASE64" | base64 --decode > /tmp/cert.p12
          security import /tmp/cert.p12 -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN" >/dev/null
          rm /tmp/cert.p12
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_DIR/${{ env.PROVISIONING_PROFILE_NAME }}.mobileprovision"

      - name: Inject version into Info.plist
        run: |
          plutil -replace CFBundleShortVersionString -string "${{ steps.version.outputs.name }}" ios/App/App/Info.plist
          plutil -replace CFBundleVersion -string "${{ steps.version.outputs.code }}" ios/App/App/Info.plist

      - name: Build archive
        working-directory: ios/App
        run: |
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/App.xcarchive \
            -allowProvisioningUpdates \
            archive 2>&1 | tee /tmp/xcodebuild.log

      - name: Show raw errors on failure
        if: failure()
        run: |
          grep -E "error:|warning:" /tmp/xcodebuild.log || tail -200 /tmp/xcodebuild.log

      - name: Export IPA
        working-directory: ios/App
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/ipa \
            -allowProvisioningUpdates

      - name: Upload to TestFlight
        if: inputs.deploy
        working-directory: ios
        env:
          APP_IDENTIFIER: ${{ env.BUNDLE_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ET_ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ET_ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_FILEPATH: /tmp/AuthKey.p8
        run: |
          echo "${{ secrets.ET_ASC_API_KEY_BASE64 }}" | base64 --decode > /tmp/AuthKey.p8
          bundle exec fastlane pilot upload \
            --ipa App/build/ipa/App.ipa \
            --skip_waiting_for_build_processing true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ios-ipa
          path: ios/App/build/ipa/*.ipa
          retention-days: 14

      - name: Notify Telegram
        if: always()
        env:
          BOT: ${{ secrets.CI_REPORT_TELEGRAM_BOT_TOKEN }}
          CHAT: ${{ secrets.CI_REPORT_TELEGRAM_CHAT_ID }}
          TOPIC: ${{ secrets.CI_REPORT_TELEGRAM_TOPIC_ID }}
        run: |
          STATUS="${{ job.status == 'success' && '✅ Success' || '❌ Failed' }}"
          MSG=$'🍎 Build '"${{ env.APP_NAME }}"$' iOS\nStatus: '"$STATUS"$'\nVersion: '"${{ steps.version.outputs.name }} (${{ steps.version.outputs.code }})"$'\nRun: '"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot$BOT/sendMessage" \
            -d chat_id="$CHAT" \
            ${TOPIC:+-d message_thread_id="$TOPIC"} \
            -d text="$MSG"
